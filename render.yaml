services:
  - type: web
    name: strategic-shield
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: LIVE_EVENT_REFRESH_MINUTES
        value: "15"

  - type: cron
    name: strategic-shield-live-events
    runtime: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.ingest_events
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: LIVE_EVENT_REFRESH_MINUTES
        value: "15"
